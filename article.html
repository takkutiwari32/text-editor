<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tech Blog Pro CMS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="top-bar">
    <div class="logo-section">
      <span class="logo-text">PRO CMS</span>
    </div>
    <div class="center-controls">
      <button class="icon-btn" id="undo-btn" title="Undo">↺</button>
      <button class="icon-btn" id="redo-btn" title="Redo">↻</button>
      <span class="save-status">Draft status: Unsaved</span>
    </div>
    <div class="action-section">
      <button class="btn-secondary" id="preview-btn">Preview</button>
      <button class="btn-primary" id="publish-btn">Save to Local OS</button>
    </div>
  </nav>

  <div class="app-body">
    
    <aside class="left-sidebar">
      <div class="sidebar-title">Add Elements</div>
      <div class="tool-grid">
        <button class="tool-card" id="tool-header">
          <span class="tool-icon">H</span>
          <span class="tool-name">Heading</span>
        </button>
        <button class="tool-card" id="tool-image">
          <span class="tool-icon">*</span>
          <span class="tool-name">Image</span>
        </button>
        <button class="tool-card" id="tool-code">
          <span class="tool-icon">&lt;/&gt;</span>
          <span class="tool-name">Code</span>
        </button>
        <button class="tool-card" id="tool-table">
          <span class="tool-icon">⊞</span>
          <span class="tool-name">Table</span>
        </button>
        <button class="tool-card" id="tool-list">
          <span class="tool-icon">•</span>
          <span class="tool-name">List</span>
        </button>
        <button class="tool-card" id="tool-audio">
          <span class="tool-icon">∬</span>
          <span class="tool-name">Audio</span>
        </button>
        <button class="tool-card" id="tool-draw">
          <span class="tool-icon">✎</span>
          <span class="tool-name">Draw</span>
        </button>
      </div>
      
      <style>
        .ai-flyout {
          position: fixed;
          bottom: 0;
          left: 0;
          width: 260px; 
          background-color: #0d1117;
          border-top: 1px solid var(--border-color);
          border-right: 1px solid var(--border-color);
          padding: 15px;
          transition: width 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
          z-index: 9999; 
          box-sizing: border-box;
          border-top-right-radius: 8px;
        }
        
        .ai-flyout:hover {
          width: 25vw; 
          box-shadow: 10px 0 20px rgba(0,0,0,0.6);
        }

        #ai-chat-window {
          height: 250px;
          overflow-y: auto;
          background: #161b22;
          border: 1px solid var(--border-color);
          border-radius: 4px;
          padding: 10px;
          margin-bottom: 10px;
          font-size: 0.85rem;
          color: var(--text-main);
          display: flex;
          flex-direction: column;
          gap: 8px;
          transition: height 0.3s ease;
        }

        .ai-flyout:hover #ai-chat-window {
          height: 450px; 
        }
      </style>

      <div class="ai-flyout">
        <div class="sidebar-title" style="margin-bottom: 10px;">AI Co-Pilot (Phi-3)</div>
        <div id="ai-chat-window">
          <div style="color: var(--text-muted); font-style: italic;">System: Local Phi-3 engine online. Waiting for prompt...</div>
        </div>
        
        <div style="display: flex; gap: 5px;">
          <input type="text" id="ai-chat-input" class="setting-input" placeholder="Ask Co-Pilot..." style="flex-grow: 1;">
          <button id="ai-send-btn" class="btn-primary" style="padding: 5px 10px; min-width: 40px;">Go</button>
        </div>

        <div style="margin-top: 8px;">
          <button id="ai-grammar-btn" class="btn-secondary" style="width: 100%; font-size: 0.8rem; border-color: #58a6ff; color: #58a6ff;">✨ Fix Active Block Grammar</button>
        </div>
      </div>
    </aside>

    <main class="editor-canvas">
      <div class="document-container">
       <h1 id="article-title" class="document-title" contenteditable="true" data-placeholder="Enter an epic tech title..."></h1>
        <div id="editor-container"></div>
      </div>
    </main>

    <aside class="right-sidebar">
      <div class="sidebar-title" style="margin-bottom: 15px;">Post Properties</div>
      
      <div class="sidebar-title" style="margin-bottom: 15px;">Typography Engine</div>
      
      <div class="typo-row">
        <label>Font Color</label>
        <input type="color" id="style-color" value="#f85149" class="typo-color">
      </div>
      
      <div class="typo-row">
        <label>Font Size</label>
        <input type="text" id="style-size" class="typo-input" placeholder="e.g. 24px">
      </div>

      <div class="typo-row">
        <label>Font Style</label>
        <select id="style-font" class="typo-input" style="cursor: pointer;">
          <option value="">Theme Default</option>
          
          <optgroup label="Coding & Tech (Monospace)">
            <option value="Consolas, monospace">Consolas (IDE Default)</option>
            <option value="'Courier New', Courier, monospace">Courier New</option>
            <option value="'Lucida Console', Monaco, monospace">Lucida Console</option>
          </optgroup>
          
          <optgroup label="Modern Editorial (Sans-Serif)">
            <option value="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">Segoe UI</option>
            <option value="Verdana, Geneva, sans-serif">Verdana</option>
            <option value="'Trebuchet MS', Helvetica, sans-serif">Trebuchet MS</option>
            <option value="Tahoma, Geneva, sans-serif">Tahoma</option>
            <option value="'Century Gothic', sans-serif">Century Gothic</option>
            <option value="Arial, Helvetica, sans-serif">Arial</option>
          </optgroup>
          
          <optgroup label="Classic News (Serif)">
            <option value="Georgia, serif">Georgia</option>
            <option value="Garamond, serif">Garamond</option>
            <option value="'Palatino Linotype', 'Book Antiqua', Palatino, serif">Palatino Linotype</option>
            <option value="Cambria, Georgia, serif">Cambria</option>
            <option value="'Times New Roman', Times, serif">Times New Roman</option>
          </optgroup>
          
          <optgroup label="Display & Heavy">
            <option value="Impact, fantasy">Impact</option>
            <option value="'Arial Black', Gadget, sans-serif">Arial Black</option>
            <option value="'Comic Sans MS', cursive">Comic Sans MS</option>
          </optgroup>
        </select>
      </div>

      <hr style="border: 1px solid var(--border-color); margin: 20px 0; width: 100%;">
      
      <div class="settings-group">
        <label>URL Slug</label>
        <input type="text" class="setting-input" placeholder="e.g. /my-new-post">
      </div>
      
      <div class="settings-group">
        <label>Tags (Comma separated)</label>
        <input type="text" class="setting-input" placeholder="C, Python, Linux">
      </div>
      
      <div class="stats-box">
        <div class="stat-row">Words: <span id="word-count">0</span></div>
        <div class="stat-row">Est. Read: <span id="read-time">0 min</span></div>
      </div>
    </aside>

  </div>

  <script>if (typeof module === 'object') { window.module = module; module = undefined; }</script>
  
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/list@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/code@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/table@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/marker@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/image@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/underline@latest"></script>

  <script>if (window.module) { module = window.module; }</script>
  
  <script src="editor-core.js"></script>

</body>
</html>
