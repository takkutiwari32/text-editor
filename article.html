<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tech Blog Pro CMS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="top-bar">
    <div class="logo-section">
      <span class="logo-text">PRO CMS</span>
    </div>
    <div class="center-controls">
      <button class="icon-btn" id="undo-btn" title="Undo">↺</button>
      <button class="icon-btn" id="redo-btn" title="Redo">↻</button>
      <span class="save-status">Draft status: Unsaved</span>
    </div>
    <div class="action-section">
      <button class="btn-secondary" id="preview-btn">Preview</button>
      <button class="btn-primary" id="publish-btn">Save to Local OS</button>
    </div>
  </nav>

  <div class="app-body">
    
<aside class="left-sidebar">
      <div class="sidebar-title">Add Elements</div>
      <div class="tool-grid">
        <button class="tool-card" id="tool-header">
          <span class="tool-icon">H</span>
          <span class="tool-name">Heading</span>
        </button>
        <button class="tool-card" id="tool-image">
          <span class="tool-icon">🖼</span>
          <span class="tool-name">Image</span>
        </button>
        <button class="tool-card" id="tool-code">
          <span class="tool-icon">&lt;/&gt;</span>
          <span class="tool-name">Code</span>
        </button>
        <button class="tool-card" id="tool-table">
          <span class="tool-icon">⊞</span>
          <span class="tool-name">Table</span>
        </button>
        <button class="tool-card" id="tool-list">
          <span class="tool-icon">•</span>
          <span class="tool-name">List</span>
        </button>
        <button class="tool-card" id="tool-audio">
          <span class="tool-icon">🎵</span>
          <span class="tool-name">Audio</span>
        </button>
        <button class="tool-card" id="tool-draw">
          <span class="tool-icon">🖍️</span>
          <span class="tool-name">Draw</span>
        </button>
      </div>
    </aside>
    <main class="editor-canvas">
      <div class="document-container">
        <input type="text" id="article-title" class="document-title" placeholder="Enter an epic tech title...">
        <div id="editor-container"></div>
      </div>
    </main>

    <aside class="right-sidebar">
      <div class="sidebar-title">Post Properties</div>
      
      <div class="settings-group">
        <label>URL Slug</label>
        <input type="text" class="setting-input" placeholder="e.g. /my-new-post">
      </div>
      
      <div class="settings-group">
        <label>Tags (Comma separated)</label>
        <input type="text" class="setting-input" placeholder="C, Python, Linux">
      </div>
      
      <div class="stats-box">
        <div class="stat-row">Words: <span id="word-count">0</span></div>
        <div class="stat-row">Est. Read: <span id="read-time">0 min</span></div>
      </div>
    </aside>

  </div>

  <script>if (typeof module === 'object') { window.module = module; module = undefined; }</script>
  
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/list@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/code@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/table@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/marker@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/image@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/underline@latest"></script>

  <script>if (window.module) { module = window.module; }</script>
  
  <script src="editor-core.js"></script>

</body>
</html>
